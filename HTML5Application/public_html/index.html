<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D 河内塔</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<h1>🗼 河内塔（3D）</h1>

<div class="controls">
  <label>圆盘数：
    <input type="range" id="diskInput" min="3" max="8" value="5">
    <span id="diskCount">5</span>
  </label>

  <span>步数：<span id="moveCounter">0</span></span>

  <button id="resetBtn">重置</button>
  <button id="autoBtn">自动解题</button>
</div>

<div class="game" id="gameBoard">
  <div class="peg" data-index="0"></div>
  <div class="peg" data-index="1"></div>
  <div class="peg" data-index="2"></div>
</div>

<div id="message"></div>

<script src="script.js"></script>
</body>
</html>
